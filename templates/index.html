<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Health Monitor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>⚙️ Asset Health AI</h1>
            <p>Predictive Sensor Analysis</p>
        </header>

        <form id="predictForm">
            <div class="input-grid">
                <div class="field"><label>Vibration X</label><input type="number" step="any" name="v_x" placeholder="0.00" required></div>
                <div class="field"><label>Vibration Y</label><input type="number" step="any" name="v_y" placeholder="0.00" required></div>
                <div class="field"><label>Vibration Z</label><input type="number" step="any" name="v_z" placeholder="0.00" required></div>
                <div class="field"><label>Temp (°C)</label><input type="number" step="any" name="temp" placeholder="45.0" required></div>
                <div class="field"><label>Current (A)</label><input type="number" step="any" name="curr" placeholder="1.20" required></div>
                <div class="field"><label>RPM</label><input type="number" step="any" name="rpm" placeholder="1500" required></div>
                <div class="field full"><label>Pressure (Bar)</label><input type="number" step="any" name="pres" placeholder="2.50" required></div>
            </div>
            <button type="submit" id="submitBtn">RUN DIAGNOSTIC</button>
        </form>

        <div id="resultDisplay" class="hidden"></div>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
